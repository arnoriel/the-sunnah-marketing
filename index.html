    <!-- ═══════════════════════════════════════
         CRITICAL PERF: PRECONNECT + DNS PREFETCH
         Order matters — preconnect first, then dns-prefetch as fallback
    ═══════════════════════════════════════ -->
    <!-- YouTube thumbnail CDN — needed for LCP image -->
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Calendly -->
    <link rel="dns-prefetch" href="https://calendly.com" />
    <!-- YouTube embed (only loaded on click, but preconnect speeds it up) -->
    <link rel="dns-prefetch" href="https://www.youtube.com" />

    <!-- ═══════════════════════════════════════
         CRITICAL PERF: PRELOAD LCP IMAGE
         The YouTube thumbnail is the LCP element on both mobile and desktop.
         Preloading it tells the browser to fetch it at highest priority,
         competing only with CSS/JS — dramatically cuts LCP time.
    ═══════════════════════════════════════ -->
    <link
      rel="preload"
      as="image"
      href="https://i.ytimg.com/vi/FOup6vHkTyY/hqdefault.jpg"
      fetchpriority="high"
    />

    <!-- ═══════════════════════════════════════
         FONTS — only load weights actually used (400, 500, 600, 700, 800)
         Removed: 300 and italic variants → saves ~30KB per removed weight
         display=swap prevents invisible text during font load (no CLS)
    ═══════════════════════════════════════ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
